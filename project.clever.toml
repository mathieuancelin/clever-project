name = "App test project"
description = "A very nice project"
# org = "orga_xxxxxx"
region = "par"

[variables.common]
domain = "foo.bar"

[variables.prod]
apikey = "${secrets.apikey}"

[variables.dev]
apikey = "secret_for_dev"

[apps.app]
name = "${env}-apptest"
kind = "node"
# source = { from = "https://github.com/mathieuancelin/demo-mcp-apps.git" }
domains = ["apptest.${domain}"]
dependencies = ["cellar", "storage"]

[apps.app.env]
NODE_ENV = "prod"
PORT = "8080"
APIKEY = "${apikey}"

[addons.cellar]
name = "${env}-apptest-cellar"
kind = "cellar-addon"
size = "S"

[addons.storage]
name = "${env}-apptest-storage"
kind = "postgresql-addon"
size = "xs_big"
crypted = true
